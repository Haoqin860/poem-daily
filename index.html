<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日诗词 | 唐诗宋词精选</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink-black: #1a1a1a;
            --ink-gray: #4a4a4a;
            --paper-cream: #f5f0e8;
            --paper-aged: #e8e0d0;
            --vermilion: #c41e3a;
            --gold: #c9a227;
            --gold-light: #d4af37;
            --jade: #2d5a4a;
            --mist: rgba(245, 240, 232, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--ink-black);
            color: var(--ink-black);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page-wrapper { min-height: 100vh; position: relative; }

        .ink-texture {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            z-index: 1000;
        }

        .mountain-bg {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, var(--ink-black) 0%, transparent 100%),
                radial-gradient(ellipse at 20% 80%, var(--jade) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, #1e3a3a 0%, transparent 50%);
            z-index: 0;
        }

        .mountain-silhouette { position: fixed; bottom: 0; left: 0; width: 100%; height: 45%; z-index: 1; }
        .mountain-silhouette svg { width: 100%; height: 100%; }

        .main-container {
            position: relative; z-index: 10; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 3rem 2rem;
        }

        .header { text-align: center; margin-bottom: 2rem; animation: fadeInDown 1s ease-out; }

        .header h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            color: var(--paper-cream); letter-spacing: 0.3em; margin-bottom: 0.5rem;
            text-shadow: 0 0 40px rgba(201, 162, 39, 0.3);
        }

        .header .subtitle { font-size: 0.9rem; color: var(--gold); letter-spacing: 0.5em; text-transform: uppercase; }

        .date-section { text-align: center; margin-bottom: 1.5rem; animation: fadeIn 1s ease-out 0.2s both; }

        .season-badge {
            display: inline-block; background: linear-gradient(135deg, var(--jade), #3d6b5a);
            color: var(--paper-cream); padding: 0.4rem 1.2rem; font-size: 0.8rem;
            letter-spacing: 0.3em; margin-bottom: 0.8rem; border-radius: 2px;
        }

        .date-display { margin-top: 0.5rem; }
        .date-display .solar-date { font-family: 'Ma Shan Zheng', cursive; font-size: 1.4rem; color: var(--paper-aged); letter-spacing: 0.2em; }
        .date-display .lunar-date { font-size: 0.85rem; color: var(--gold); letter-spacing: 0.15em; margin-top: 0.3rem; }

        .poem-card {
            background: linear-gradient(135deg, var(--mist) 0%, rgba(245, 240, 232, 0.95) 100%);
            border-radius: 4px; padding: 2.5rem 3rem; max-width: 680px; width: 100%;
            position: relative;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            animation: fadeInUp 1s ease-out 0.4s both;
            border: 1px solid rgba(201, 162, 39, 0.2);
        }

        .poem-card::before {
            content: ''; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid rgba(201, 162, 39, 0.15); pointer-events: none;
        }

        .poem-type-badge {
            position: absolute; top: -1px; right: 35px;
            background: var(--vermilion); color: var(--paper-cream);
            font-size: 0.7rem; padding: 0.35rem 0.9rem; letter-spacing: 0.2em;
        }

        .poem-header { text-align: center; margin-bottom: 1.8rem; padding-bottom: 1.2rem; border-bottom: 1px solid rgba(201, 162, 39, 0.3); }

        .poem-title { font-family: 'Ma Shan Zheng', cursive; font-size: 2rem; color: var(--ink-black); letter-spacing: 0.15em; margin-bottom: 0.4rem; }
        .poem-author { color: var(--ink-gray); font-size: 0.85rem; letter-spacing: 0.3em; }
        .poem-author span { color: var(--gold); }

        .poem-content { line-height: 2.3; text-align: center; }
        .poem-line { display: inline; font-size: 1.35rem; color: var(--ink-black); letter-spacing: 0.08em; }
        .poem-separator { display: block; height: 1.2rem; }
        .poem-paragraph { display: block; margin-bottom: 0.3rem; }

        .poem-brief {
            margin-top: 1.5rem; padding-top: 1.2rem; border-top: 1px solid rgba(201, 162, 39, 0.3);
            font-size: 0.88rem; color: var(--ink-gray); line-height: 1.8; text-align: justify; text-indent: 2em;
        }

        .action-buttons { display: flex; gap: 1rem; margin-top: 1.8rem; justify-content: center; flex-wrap: wrap; }

        .btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 0.6rem 1.5rem; font-family: 'Noto Serif SC', serif;
            font-size: 0.8rem; letter-spacing: 0.2em; cursor: pointer;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }

        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--gold); transition: left 0.3s ease; z-index: -1;
        }

        .btn:hover { color: var(--ink-black); }
        .btn:hover::before { left: 0; }

        .btn-secondary { border-color: var(--paper-aged); color: var(--paper-aged); }
        .btn-secondary::before { background: var(--paper-aged); }

        .btn-interpret { border-color: var(--vermilion); color: var(--vermilion); }
        .btn-interpret::before { background: var(--vermilion); }

        .favorites-section, .search-section { max-width: 680px; width: 100%; margin-top: 1.5rem; animation: fadeInUp 1s ease-out 0.6s both; }

        .section-title { font-family: 'Ma Shan Zheng', cursive; font-size: 1.2rem; color: var(--paper-aged); letter-spacing: 0.2em; text-align: center; margin-bottom: 0.8rem; }

        .favorites-list, .category-filter { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }

        .favorite-tag, .filter-btn {
            background: rgba(245, 240, 232, 0.08); border: 1px solid rgba(201, 162, 39, 0.3);
            color: var(--paper-aged); padding: 0.35rem 0.9rem;
            font-size: 0.75rem; letter-spacing: 0.1em; cursor: pointer;
            transition: all 0.3s; border-radius: 2px;
        }

        .favorite-tag:hover, .filter-btn:hover:not(.active) { background: rgba(201, 162, 39, 0.2); border-color: var(--gold); }
        .filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--ink-black); }

        .empty-favorites { color: rgba(245, 240, 232, 0.4); font-size: 0.8rem; letter-spacing: 0.1em; }

        .footer { margin-top: auto; padding-top: 2.5rem; text-align: center; animation: fadeIn 1s ease-out 0.8s both; }
        .footer p { font-size: 0.7rem; color: rgba(245, 240, 232, 0.4); letter-spacing: 0.2em; }

        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--paper-cream); color: var(--ink-black);
            padding: 0.9rem 1.8rem; border-radius: 4px; font-size: 0.85rem;
            letter-spacing: 0.1em; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            opacity: 0; transition: all 0.4s ease; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.4s ease; padding: 2rem;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }

        .modal-content {
            background: linear-gradient(135deg, var(--paper-cream) 0%, var(--paper-aged) 100%);
            max-width: 800px; width: 100%; max-height: 85vh; overflow-y: auto;
            border-radius: 4px; position: relative;
            transform: translateY(30px); transition: transform 0.4s ease;
        }
        .modal-overlay.show .modal-content { transform: translateY(0); }

        .modal-content::before {
            content: ''; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid rgba(201, 162, 39, 0.2); pointer-events: none;
        }

        .modal-header { padding: 2rem 2.5rem 1.5rem; border-bottom: 1px solid rgba(201, 162, 39, 0.3); position: relative; }

        .modal-close {
            position: absolute; top: 1.2rem; right: 1.5rem; background: none; border: none;
            font-size: 1.5rem; color: var(--ink-gray); cursor: pointer; transition: color 0.3s; line-height: 1;
        }
        .modal-close:hover { color: var(--vermilion); }

        .modal-title { font-family: 'Ma Shan Zheng', cursive; font-size: 1.8rem; color: var(--ink-black); letter-spacing: 0.1em; margin-bottom: 0.3rem; }
        .modal-author { color: var(--ink-gray); font-size: 0.85rem; letter-spacing: 0.2em; }
        .modal-author span { color: var(--gold); }

        .modal-body { padding: 1.5rem 2.5rem 2rem; }

        .interpret-section { margin-bottom: 1.8rem; }
        .interpret-section:last-child { margin-bottom: 0; }

        .section-label {
            display: inline-block; background: var(--gold); color: var(--paper-cream);
            font-size: 0.7rem; padding: 0.25rem 0.8rem; letter-spacing: 0.2em; margin-bottom: 0.8rem;
        }

        .interpret-text { font-size: 0.9rem; color: var(--ink-black); line-height: 2; text-align: justify; }
        .interpret-text.indent { text-indent: 2em; }

        .highlight-poem { background: rgba(201, 162, 39, 0.08); padding: 1.5rem; margin: 1rem 0; text-align: center; border-left: 3px solid var(--gold); }
        .highlight-poem .line { font-size: 1.15rem; color: var(--ink-black); letter-spacing: 0.1em; line-height: 2; display: block; }

        .poem-scroll { max-height: 200px; overflow-y: auto; padding-right: 0.5rem; }
        .poem-scroll::-webkit-scrollbar { width: 4px; }
        .poem-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

        .search-box { display: flex; gap: 0.5rem; }
        .search-input {
            flex: 1; background: rgba(245, 240, 232, 0.08); border: 1px solid rgba(201, 162, 39, 0.3);
            color: var(--paper-aged); padding: 0.6rem 1rem;
            font-family: 'Noto Serif SC', serif; font-size: 0.85rem; letter-spacing: 0.1em; outline: none; transition: border-color 0.3s;
        }
        .search-input::placeholder { color: rgba(245, 240, 232, 0.4); }
        .search-input:focus { border-color: var(--gold); }

        .search-results { margin-top: 1rem; max-height: 300px; overflow-y: auto; }
        .search-result-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.6rem 0.8rem; border-bottom: 1px solid rgba(201, 162, 39, 0.1); cursor: pointer; transition: background 0.3s;
        }
        .search-result-item:hover { background: rgba(201, 162, 39, 0.1); }
        .search-result-item .title { font-size: 0.9rem; color: var(--ink-black); letter-spacing: 0.05em; }
        .search-result-item .author { font-size: 0.75rem; color: var(--ink-gray); letter-spacing: 0.1em; }

        .poem-stats { font-size: 0.7rem; color: rgba(245, 240, 232, 0.4); letter-spacing: 0.1em; margin-top: 0.5rem; text-align: center; }

        .loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ink-black); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease; padding: 2rem;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loading-text { font-family: 'Ma Shan Zheng', cursive; font-size: 2.5rem; color: var(--paper-cream); letter-spacing: 0.5em; animation: pulse 1.5s ease-in-out infinite; }
        .loading-hint { margin-top: 1rem; font-size: 0.8rem; color: var(--gold); letter-spacing: 0.2em; text-align: center; }

        .server-hint {
            background: rgba(196, 30, 58, 0.2); border: 1px solid var(--vermilion);
            color: var(--paper-cream); padding: 1.5rem; border-radius: 4px;
            margin-top: 1rem; max-width: 400px; text-align: center;
        }
        .server-hint code { background: rgba(0,0,0,0.3); padding: 0.2rem 0.5rem; border-radius: 2px; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        @media (max-width: 768px) {
            .poem-card { padding: 2rem 1.5rem; margin: 0 1rem; }
            .modal-content { max-height: 90vh; }
            .modal-header, .modal-body { padding-left: 1.5rem; padding-right: 1.5rem; }
            .action-buttons { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <span class="loading-text">墨</span>
        <span class="loading-hint" id="loadingHint">正在加载...</span>
        <div class="server-hint" id="serverHint" style="display: none;">
            <p>请使用本地服务器打开此页面</p>
            <p style="margin-top: 0.5rem; font-size: 0.75rem;">请在项目目录下运行：</p>
            <code>python3 -m http.server 8080</code>
            <p style="margin-top: 0.5rem; font-size: 0.75rem;">然后访问 http://localhost:8080</p>
        </div>
    </div>

    <div class="page-wrapper">
        <div class="ink-texture"></div>
        <div class="mountain-bg"></div>
        <div class="mountain-silhouette">
            <svg viewBox="0 0 1440 400" preserveAspectRatio="none">
                <path fill="rgba(26, 26, 26, 0.8)" d="M0,400 L0,280 Q120,200 240,260 T480,220 T720,180 T960,200 T1200,160 T1440,200 L1440,400 Z"/>
                <path fill="rgba(26, 26, 26, 0.6)" d="M0,400 L0,320 Q180,280 360,300 T720,260 T1080,220 T1440,280 L1440,400 Z"/>
                <path fill="rgba(26, 26, 26, 0.4)" d="M0,400 L0,350 Q240,320 480,340 T960,300 T1440,330 L1440,400 Z"/>
            </svg>
        </div>

        <div class="main-container">
            <header class="header">
                <h1>每日诗词</h1>
                <p class="subtitle">Tang & Song Poetry</p>
            </header>

            <div class="date-section">
                <div class="season-badge" id="seasonBadge">春 · 万物复苏</div>
                <div class="date-display">
                    <div class="solar-date" id="solarDate"></div>
                    <div class="lunar-date" id="lunarDate"></div>
                </div>
            </div>

            <article class="poem-card" id="poemCard">
                <div class="poem-type-badge" id="poemType">唐诗</div>
                <header class="poem-header">
                    <h2 class="poem-title" id="poemTitle">静夜思</h2>
                    <p class="poem-author"><span id="poemAuthor">李白</span> · <span id="poemDynasty">唐</span></p>
                </header>
                <div class="poem-content" id="poemContent"></div>
                <p class="poem-brief" id="poemBrief">加载中...</p>
                <div class="action-buttons">
                    <button class="btn" onclick="prevPoem()">← 上一首</button>
                    <button class="btn" onclick="shufflePoem()">随机</button>
                    <button class="btn btn-interpret" onclick="openInterpret()">诗词解读</button>
                    <button class="btn" onclick="nextPoem()">下一首 →</button>
                </div>
                <div class="action-buttons" style="margin-top: 0.8rem;">
                    <button class="btn btn-secondary" onclick="toggleFavorite()">收藏</button>
                    <button class="btn btn-secondary" onclick="sharePoem()">分享</button>
                </div>
            </article>

            <section class="search-section">
                <div class="category-filter">
                    <button class="filter-btn active" onclick="setFilter('all')">全部</button>
                    <button class="filter-btn" onclick="setFilter('唐诗')">唐诗</button>
                    <button class="filter-btn" onclick="setFilter('宋词')">宋词</button>
                    <button class="filter-btn" onclick="setFilter('元曲')">元曲</button>
                </div>
                <div class="search-box">
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索诗词、作者..." oninput="searchPoems()">
                </div>
                <div class="search-results" id="searchResults"></div>
                <p class="poem-stats" id="poemStats"></p>
            </section>

            <section class="favorites-section">
                <h3 class="section-title">我的收藏</h3>
                <div class="favorites-list" id="favoritesList"><span class="empty-favorites">暂无收藏</span></div>
            </section>

            <footer class="footer"><p>诗词之美 · 传承千年</p></footer>
        </div>
    </div>

    <div class="modal-overlay" id="interpretModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <button class="modal-close" onclick="closeInterpret()">×</button>
                <h3 class="modal-title" id="modalTitle">静夜思</h3>
                <p class="modal-author"><span id="modalAuthor">李白</span> · <span id="modalDynasty">唐</span></p>
            </div>
            <div class="modal-body">
                <div class="interpret-section">
                    <span class="section-label">诗词全文</span>
                    <div class="highlight-poem poem-scroll" id="modalPoemContent"></div>
                </div>
                <div class="interpret-section" id="notesSection">
                    <span class="section-label">注释</span>
                    <p class="interpret-text indent" id="modalNotes"></p>
                </div>
                <div class="interpret-section" id="translationSection">
                    <span class="section-label">译文</span>
                    <p class="interpret-text indent" id="modalTranslation"></p>
                </div>
                <div class="interpret-section">
                    <span class="section-label">赏析</span>
                    <p class="interpret-text indent" id="modalAppreciation"></p>
                </div>
                <div class="interpret-section" id="sourceSection" style="display:none;">
                    <span class="section-label">来源</span>
                    <p class="interpret-text" id="modalSource"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const POEMS_DATA_URL = 'data/poems.json';
        const APPRECIATIONS_DATA_URL = 'data/appreciations.json';

        let allPoems = [];
        let tangPoems = [];
        let songCiPoems = [];
        let yuanQuPoems = [];
        let appreciations = {};
        let currentIndex = 0;
        let currentPoem = null;
        let currentFilter = 'all';
        let favorites = JSON.parse(localStorage.getItem('poemFavorites')) || [];
        let loadingCount = 0;

        const seasons = {
            spring: { name: "春", desc: "万物复苏", months: [2, 3, 4] },
            summer: { name: "夏", desc: "骄阳似火", months: [5, 6, 7] },
            autumn: { name: "秋", desc: "金风送爽", months: [8, 9, 10] },
            winter: { name: "冬", desc: "寒梅傲雪", months: [11, 12, 1] }
        };

        const lunarMonths = ['正月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '冬月', '腊月'];
        const lunarDays = ['初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十', '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十', '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'];
        const solarTerms = ['小寒', '大寒', '立春', '雨水', '惊蛰', '春分', '清明', '谷雨', '立夏', '小满', '芒种', '夏至', '小暑', '大暑', '立秋', '处暑', '白露', '秋分', '寒露', '霜降', '立冬', '小雪', '大雪', '冬至'];

        async function loadData() {
            try {
                updateLoadingHint('正在加载诗词数据...');

                const [poemsRes, appreciationsRes] = await Promise.all([
                    fetch(POEMS_DATA_URL),
                    fetch(APPRECIATIONS_DATA_URL)
                ]);

                if (!poemsRes.ok) throw new Error('诗词数据加载失败');

                const poemsData = await poemsRes.json();
                tangPoems = poemsData.filter(p => p.dynasty === '唐');
                songCiPoems = poemsData.filter(p => p.dynasty === '宋');
                yuanQuPoems = poemsData.filter(p => p.dynasty === '元');
                allPoems = [...tangPoems, ...songCiPoems, ...yuanQuPoems];

                if (appreciationsRes.ok) {
                    const appData = await appreciationsRes.json();
                    appreciations = appData;
                    updateLoadingHint(`已加载 ${allPoems.length} 首诗词，${Object.keys(appreciations).length} 条赏析`);
                } else {
                    updateLoadingHint(`已加载 ${allPoems.length} 首诗词`);
                }

                init();

            } catch (error) {
                console.error('加载失败:', error);
                updateLoadingHint('加载失败');
                document.getElementById('serverHint').style.display = 'block';
            }
        }

        function updateLoadingHint(text) {
            document.getElementById('loadingHint').textContent = text;
        }

        function getSolarTerm() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const termIndex = Math.floor((month * 30 + day) / 365 * 24) % 24;
            return solarTerms[termIndex];
        }

        function getSeason() {
            const month = new Date().getMonth() + 1;
            for (const [key, s] of Object.entries(seasons)) {
                if (s.months.includes(month)) return s;
            }
            return seasons.spring;
        }

        function getLunarDate() {
            const now = new Date();
            const month = lunarMonths[now.getMonth()];
            const day = lunarDays[now.getDate() - 1];
            return `${month}${day}`;
        }

        function formatSolarDate() {
            const now = new Date();
            const months = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            return `${months[now.getMonth()]}${now.getDate()}日`;
        }

        function getDailyPoemIndex() {
            const now = new Date();
            const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            return dayOfYear;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function getFilteredPoems() {
            if (currentFilter === 'all') return allPoems;
            if (currentFilter === '唐诗') return tangPoems;
            if (currentFilter === '宋词') return songCiPoems;
            if (currentFilter === '元曲') return yuanQuPoems;
            return allPoems;
        }

        function getAppreciation(title) {
            return appreciations[title] || null;
        }

        function renderPoem(poem) {
            document.getElementById('poemType').textContent = poem.type;
            document.getElementById('poemTitle').textContent = poem.title;
            document.getElementById('poemAuthor').textContent = poem.author;
            document.getElementById('poemDynasty').textContent = poem.dynasty;

            const app = getAppreciation(poem.title);

            if (app && app.appreciation) {
                document.getElementById('poemBrief').textContent = app.appreciation.substring(0, 80) + (app.appreciation.length > 80 ? '...' : '');
            } else {
                document.getElementById('poemBrief').textContent = `《${poem.title}》是${poem.dynasty}朝${poem.author}的${poem.type}。`;
            }

            const contentEl = document.getElementById('poemContent');
            contentEl.innerHTML = '';

            if (!poem.content || poem.content.length === 0) {
                contentEl.innerHTML = '<p class="poem-paragraph"><span class="poem-line">暂无内容</span></p>';
                return;
            }

            poem.content.forEach((line, index) => {
                if (index > 0) {
                    const separator = document.createElement('span');
                    separator.className = 'poem-separator';
                    contentEl.appendChild(separator);
                }

                const paragraph = document.createElement('p');
                paragraph.className = 'poem-paragraph';

                const sentences = line.split(/[，。；！？、：]/);
                sentences.forEach((s, i) => {
                    if (s.trim()) {
                        const span = document.createElement('span');
                        span.className = 'poem-line';
                        const punctuation = i < sentences.length - 1 ? '，' : '。';
                        span.textContent = s.trim() + (s.trim() ? punctuation : '');
                        paragraph.appendChild(span);
                    }
                });

                contentEl.appendChild(paragraph);
            });
        }

        function renderModal(poem) {
            document.getElementById('modalTitle').textContent = poem.title;
            document.getElementById('modalAuthor').textContent = poem.author;
            document.getElementById('modalDynasty').textContent = poem.dynasty;

            const contentEl = document.getElementById('modalPoemContent');
            if (!poem.content || poem.content.length === 0) {
                contentEl.innerHTML = '<span class="line">暂无内容</span>';
            } else {
                contentEl.innerHTML = poem.content.map(line => `<span class="line">${line}</span>`).join('');
            }

            const app = getAppreciation(poem.title);

            // Notes section
            const notesSection = document.getElementById('notesSection');
            if (app && app.notes) {
                notesSection.style.display = 'block';
                document.getElementById('modalNotes').textContent = app.notes;
            } else {
                notesSection.style.display = 'none';
            }

            // Translation section
            const translationSection = document.getElementById('translationSection');
            if (app && app.translation) {
                translationSection.style.display = 'block';
                document.getElementById('modalTranslation').textContent = app.translation;
            } else {
                translationSection.style.display = 'none';
            }

            // Appreciation
            if (app && app.appreciation) {
                document.getElementById('modalAppreciation').textContent = app.appreciation;
            } else {
                document.getElementById('modalAppreciation').textContent = '暂无赏析';
            }

            // Source
            const sourceSection = document.getElementById('sourceSection');
            if (app && app.source) {
                sourceSection.style.display = 'block';
                document.getElementById('modalSource').textContent = app.source;
            } else {
                sourceSection.style.display = 'none';
            }
        }

        function prevPoem() {
            const filtered = getFilteredPoems();
            if (filtered.length === 0) return;
            currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
            currentPoem = filtered[currentIndex];
            animateChange();
        }

        function nextPoem() {
            const filtered = getFilteredPoems();
            if (filtered.length === 0) return;
            currentIndex = (currentIndex + 1) % filtered.length;
            currentPoem = filtered[currentIndex];
            animateChange();
        }

        function shufflePoem() {
            const filtered = getFilteredPoems();
            if (filtered.length === 0) return;
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * filtered.length);
            } while (newIndex === currentIndex && filtered.length > 1);
            currentIndex = newIndex;
            currentPoem = filtered[currentIndex];
            animateChange();
        }

        function animateChange() {
            const card = document.getElementById('poemCard');
            card.style.animation = 'none';
            card.offsetHeight;
            card.style.animation = 'fadeInUp 0.6s ease-out';
            renderPoem(currentPoem);
            document.getElementById('searchResults').innerHTML = '';
        }

        function openInterpret() {
            if (!currentPoem) return;
            renderModal(currentPoem);
            document.getElementById('interpretModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeInterpret() {
            document.getElementById('interpretModal').classList.remove('show');
            document.body.style.overflow = '';
        }

        function closeModal(event) {
            if (event.target.id === 'interpretModal') closeInterpret();
        }

        function setFilter(filter) {
            currentFilter = filter;
            currentIndex = 0;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === filter || (filter === 'all' && btn.textContent === '全部'));
            });

            const filtered = getFilteredPoems();
            if (filtered.length > 0) {
                currentPoem = filtered[0];
                renderPoem(currentPoem);
            }

            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
        }

        function toggleFavorite() {
            if (!currentPoem) return;

            const index = favorites.findIndex(p => p.title === currentPoem.title && p.author === currentPoem.author);

            if (index > -1) {
                favorites.splice(index, 1);
                showToast('已取消收藏');
            } else {
                favorites.push({
                    title: currentPoem.title,
                    author: currentPoem.author,
                    dynasty: currentPoem.dynasty,
                    type: currentPoem.type
                });
                showToast('已添加到收藏');
            }

            localStorage.setItem('poemFavorites', JSON.stringify(favorites));
            renderFavorites();
        }

        function loadFavorite(fav) {
            const poem = allPoems.find(p => p.title === fav.title && p.author === fav.author);
            if (poem) {
                currentPoem = poem;
                const filtered = getFilteredPoems();
                currentIndex = filtered.findIndex(p => p.title === fav.title && p.author === fav.author);
                if (currentIndex === -1) currentIndex = 0;
                renderPoem(poem);
                window.scrollTo({ top: 0, behavior: 'smooth' });
                document.getElementById('searchResults').innerHTML = '';
            }
        }

        function renderFavorites() {
            const list = document.getElementById('favoritesList');
            if (favorites.length === 0) {
                list.innerHTML = '<span class="empty-favorites">暂无收藏</span>';
                return;
            }

            list.innerHTML = favorites.map(fav => `
                <span class="favorite-tag" onclick="loadFavorite({title: '${fav.title.replace(/'/g, "\\'")}', author: '${fav.author.replace(/'/g, "\\'")}', dynasty: '${fav.dynasty}', type: '${fav.type}'})">
                    ${fav.title} · ${fav.author}
                </span>
            `).join('');
        }

        function searchPoems() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsEl = document.getElementById('searchResults');

            if (!query) {
                resultsEl.innerHTML = '';
                return;
            }

            const filtered = getFilteredPoems();
            const results = filtered.filter(p =>
                (p.title && p.title.toLowerCase().includes(query)) ||
                (p.author && p.author.toLowerCase().includes(query))
            ).slice(0, 50);

            if (results.length === 0) {
                resultsEl.innerHTML = '<p style="color: var(--ink-gray); text-align: center; padding: 1rem;">未找到相关诗词</p>';
                return;
            }

            resultsEl.innerHTML = results.map(p => `
                <div class="search-result-item" onclick="selectPoem('${p.title.replace(/'/g, "\\'")}', '${p.author.replace(/'/g, "\\'")}')">
                    <div>
                        <span class="title">${p.title}</span>
                        <span class="author" style="margin-left: 0.5rem;">${p.author}</span>
                    </div>
                    <span class="author">${p.dynasty} · ${p.type}</span>
                </div>
            `).join('');
        }

        function selectPoem(title, author) {
            const poem = allPoems.find(p => p.title === title && p.author === author);
            if (poem) {
                currentPoem = poem;
                const filtered = getFilteredPoems();
                currentIndex = filtered.findIndex(p => p.title === title && p.author === author);
                if (currentIndex === -1) currentIndex = 0;
                renderPoem(poem);
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('searchInput').value = '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function sharePoem() {
            if (!currentPoem) return;
            const text = `${currentPoem.title} · ${currentPoem.author}\n\n${(currentPoem.content || []).join('\n')}\n\n—— 来自「每日诗词」`;
            if (navigator.share) {
                navigator.share({ text });
            } else {
                navigator.clipboard.writeText(text).then(() => showToast('诗词已复制到剪贴板'));
            }
        }

        function updateStats() {
            const appCount = Object.keys(appreciations).length;
            document.getElementById('poemStats').textContent = `诗词库：唐诗 ${tangPoems.length} 首 | 宋词 ${songCiPoems.length} 首 | 元曲 ${yuanQuPoems.length} 首 | 赏析 ${appCount} 条`;
        }

        function init() {
            const now = new Date();
            document.getElementById('solarDate').textContent = formatSolarDate();
            document.getElementById('lunarDate').textContent = `农历 ${getLunarDate()} · ${getSolarTerm()}`;

            const season = getSeason();
            document.getElementById('seasonBadge').textContent = `${season.name} · ${season.desc}`;

            const dailyIndex = getDailyPoemIndex();
            currentIndex = dailyIndex % allPoems.length;
            currentPoem = allPoems[currentIndex];

            renderPoem(currentPoem);
            renderFavorites();
            updateStats();

            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 500);
        }

        loadData();
    </script>
</body>
</html>
